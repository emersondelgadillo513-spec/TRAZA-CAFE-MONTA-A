<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaféTrace — Sistema de Trazabilidad</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F2EC;--bg2:#EDE8E0;--bg3:#E4DDD3;--card:#FFF;--card2:#FAFAF7;--text:#2A2318;--text2:#6B5D4F;--text3:#9C8E7E;--green:#4A6741;--green2:#3B5534;--gl:#EFF5ED;--gold:#8B7355;--goldl:#C4A97D;--blue:#0D47A1;--bluebg:#E3F2FD;--amber:#6D4C00;--amberbg:#FFF8E1;--red:#C62828;--redbg:#FFEBEE;--ok:#2E7D32;--okbg:#E8F5E9;--warn:#E65100;--warnbg:#FFF3E0;--brd:#D8D0C5;--brd2:#EDE8E0;--r:12px;--rs:8px;--sh:0 2px 12px rgba(0,0,0,.06);--shl:0 8px 32px rgba(0,0,0,.1);--fd:'Playfair Display',Georgia,serif;--fb:'DM Sans',-apple-system,sans-serif;--tr:all .2s ease}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--fb);background:linear-gradient(170deg,var(--bg),var(--bg2) 50%,var(--bg3));color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}

/* ═══ LOGIN ═══ */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1C2B1B 0%,#2D3D2C 40%,#1A261A 100%);position:relative;overflow:hidden}
.login-screen::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(196,169,125,.08) 0%,transparent 70%);top:-100px;right:-100px}
.login-screen::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(74,103,65,.1) 0%,transparent 70%);bottom:-80px;left:-80px}
.login-box{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:48px 44px;width:420px;max-width:90vw;position:relative;z-index:1;box-shadow:0 24px 64px rgba(0,0,0,.3)}
.login-box .login-logo{text-align:center;margin-bottom:36px}
.login-box .login-logo svg{color:var(--goldl);margin-bottom:16px}
.login-box .login-logo h1{font-family:var(--fd);font-size:32px;font-weight:700;color:#F5F0EB;letter-spacing:1px}
.login-box .login-logo p{font-size:12px;color:#A9B89F;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.login-field{margin-bottom:20px}
.login-field label{display:block;font-size:11px;font-weight:700;color:#A9B89F;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.login-field input{width:100%;padding:14px 18px;border-radius:12px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#F5F0EB;font-size:15px;font-family:var(--fb);outline:none;transition:var(--tr)}
.login-field input:focus{border-color:var(--goldl);box-shadow:0 0 0 3px rgba(196,169,125,.15)}
.login-field input::placeholder{color:rgba(255,255,255,.25)}
.login-btn{width:100%;padding:16px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--green),var(--green2));color:white;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--fb);transition:var(--tr);margin-top:8px;letter-spacing:.5px}
.login-btn:hover{box-shadow:0 6px 20px rgba(74,103,65,.4);transform:translateY(-2px)}
.login-error{background:rgba(198,40,40,.15);border:1px solid rgba(198,40,40,.3);border-radius:10px;padding:12px 16px;color:#ff8a80;font-size:13px;margin-bottom:16px;display:none;text-align:center}
.login-error.show{display:block;animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.login-footer{text-align:center;margin-top:24px;font-size:11px;color:rgba(255,255,255,.2)}
.login-session{display:flex;align-items:center;gap:6px;font-size:12px;color:#A9B89F;margin-top:16px;justify-content:center}
.login-session input[type=checkbox]{accent-color:var(--green)}

/* ═══ ADMIN BAR ═══ */
.admin-bar{background:rgba(196,169,125,.08);border-bottom:1px solid rgba(196,169,125,.15);padding:6px 24px;display:flex;align-items:center;justify-content:space-between;font-size:12px}
.admin-bar .admin-user{display:flex;align-items:center;gap:8px;color:var(--gold)}
.admin-bar .admin-user .avatar{width:28px;height:28px;border-radius:50%;background:var(--green);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.admin-bar .admin-actions{display:flex;gap:8px}
.admin-bar button{padding:5px 12px;border-radius:6px;border:1px solid var(--brd);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:var(--fb);transition:var(--tr)}
.admin-bar button:hover{background:var(--gl);border-color:var(--green);color:var(--green)}
.admin-bar .btn-logout{border-color:rgba(198,40,40,.3);color:var(--red)}
.admin-bar .btn-logout:hover{background:var(--redbg)}

/* ═══ HEADER ═══ */
.header{background:linear-gradient(135deg,#1C2B1B,#2D3D2C 50%,#1A261A);position:sticky;top:0;z-index:100;border-bottom:3px solid var(--gold)}
.header-inner{max-width:1320px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:var(--goldl)}
.logo h1{font-family:var(--fd);font-size:24px;font-weight:700;color:#F5F0EB}
.logo p{font-size:11px;color:#A9B89F;letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
.header-actions{display:flex;gap:8px}
.btn-header{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#F5F0EB;font-size:13px;cursor:pointer;font-family:var(--fb);transition:var(--tr)}
.btn-header:hover{background:rgba(255,255,255,.12)}
.btn-header.gold{border-color:rgba(196,169,125,.3);background:rgba(196,169,125,.1);color:var(--goldl);font-weight:600}
.main{max-width:1320px;margin:0 auto;padding:24px}
.hidden{display:none!important}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.anim-up{animation:fadeUp .5s ease both}.anim-sl{animation:slideR .4s ease both}

/* ═══ COMPONENTS ═══ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--r);padding:22px;box-shadow:var(--sh);border-top:3px solid var(--green);transition:var(--tr)}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shl)}
.stat-card .value{font-family:var(--fd);font-size:36px;font-weight:700;line-height:1.1}
.stat-card .label{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-top:4px}
.stat-card .sub{font-size:11px;font-weight:600;margin-top:4px}
.toolbar{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;align-items:center}
.search-box{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:var(--rs);padding:10px 16px;flex:1;min-width:260px;border:1px solid var(--brd);transition:var(--tr)}
.search-box:focus-within{border-color:var(--green);box-shadow:0 0 0 3px rgba(74,103,65,.1)}
.search-box input{border:none;outline:none;font-size:14px;font-family:var(--fb);flex:1;background:transparent;color:var(--text)}
.toolbar-right{display:flex;gap:10px;flex-wrap:wrap}
.toolbar select{padding:10px 14px;border-radius:var(--rs);border:1px solid var(--brd);background:var(--card);font-size:14px;font-family:var(--fb);cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--rs);border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fb);transition:var(--tr)}
.btn-primary{background:linear-gradient(135deg,var(--green),var(--green2));color:white;box-shadow:0 2px 8px rgba(74,103,65,.25)}
.btn-primary:hover{box-shadow:0 4px 16px rgba(74,103,65,.35);transform:translateY(-1px)}
.btn-secondary{background:transparent;border:1.5px solid var(--brd);color:var(--green)}
.btn-secondary:hover{border-color:var(--green);background:var(--gl)}
.btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{width:34px;height:34px;padding:0;border-radius:var(--rs);border:1px solid var(--brd2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--green);transition:var(--tr)}
.btn-icon:hover{background:var(--gl);border-color:var(--green)}
.btn-icon.danger{color:var(--red)}.btn-icon.danger:hover{background:var(--redbg)}
.table-wrap{background:var(--card);border-radius:var(--r);overflow-x:auto;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:14px 16px;border-bottom:2px solid var(--brd2);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--brd2);vertical-align:middle;font-size:13px}
tr:hover td{background:rgba(74,103,65,.02)}
.lot-id{font-weight:600;font-size:11px;color:var(--green);background:var(--gl);padding:3px 10px;border-radius:6px;white-space:nowrap}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.badge-pend{background:#FFF3CD;color:#856404}.badge-aprob{background:#D4EDDA;color:#155724}.badge-obs{background:#FFE0B2;color:#E65100}.badge-rech{background:#F8D7DA;color:#721C24}
.risk-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px}
.progress-bar{height:6px;border-radius:3px;background:var(--brd2);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s}
.cert-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap;display:inline-block;margin:1px}
.empty-state{text-align:center;padding:70px 24px;background:var(--card);border-radius:var(--r)}
.empty-state h3{font-family:var(--fd);font-size:24px;font-weight:600;margin:20px 0 10px}
.empty-state p{color:var(--text2);font-size:15px;max-width:420px;margin:0 auto 24px;line-height:1.6}
.form-card{background:var(--card);border-radius:var(--r);padding:32px;box-shadow:var(--sh)}
.form-title{font-family:var(--fd);font-size:24px;font-weight:600;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.form-desc{color:var(--text2);font-size:14px;margin-bottom:24px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
.field{display:flex;flex-direction:column}.field label{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.field input,.field select,.field textarea{padding:10px 14px;border-radius:var(--rs);border:1.5px solid var(--brd);font-size:14px;font-family:var(--fb);color:var(--text);background:var(--card2);outline:none;transition:var(--tr)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(74,103,65,.1)}
.field textarea{min-height:80px;resize:vertical}.field-full{grid-column:1/-1}
.stepper{display:flex;justify-content:center;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.step-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;min-width:80px}
.step-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--brd2);color:var(--text3);transition:var(--tr);font-size:20px}
.step-circle.active{background:var(--green);color:white;box-shadow:0 4px 14px rgba(74,103,65,.35)}
.step-circle.done{background:#A9B89F;color:white}
.step-label{font-size:12px;color:var(--green);font-weight:500}.step-label.active{font-weight:700}
.live-bar{display:flex;flex-wrap:wrap;gap:18px;background:var(--card);border-radius:var(--rs);padding:12px 20px;margin-bottom:20px;align-items:center;box-shadow:var(--sh);font-size:13px}
.live-bar .tag{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px}
.calc-box{margin-top:20px;border:1px solid var(--brd);border-radius:var(--rs);padding:16px 20px;background:var(--card2)}
.calc-box .calc-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;color:var(--green);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--brd2)}
.calc-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px dashed var(--brd2);flex-wrap:wrap;gap:4px}
.calc-row .label{font-size:13px;color:var(--text2);font-weight:500}.calc-row .value{font-weight:600;font-size:14px}.calc-row .note{font-size:11px;color:var(--text3)}
.cert-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.cert-chip{padding:8px 18px;border-radius:var(--rs);border:2px solid var(--brd);background:transparent;font-size:13px;cursor:pointer;font-family:var(--fb);color:var(--text2);transition:var(--tr);font-weight:400}
.cert-chip.selected{font-weight:700}
.cert-summary{margin-top:14px;padding:14px 18px;background:var(--card2);border-radius:var(--rs);border:1px solid var(--brd2)}
.section-header-traz{background:var(--bluebg);border-radius:var(--rs);padding:10px 16px;margin:14px 0 10px}
.section-header-traz .title{font-size:14px;font-weight:800;color:var(--blue);display:flex;align-items:center;gap:6px}
.section-header-traz .sub{font-size:11px;color:#1565C0;margin-top:2px}
.section-header-comp{background:var(--amberbg);border-radius:var(--rs);padding:10px 16px;margin:14px 0 10px}
.section-header-comp .title{font-size:14px;font-weight:800;color:var(--amber);display:flex;align-items:center;gap:6px}
.section-header-comp .sub{font-size:11px;color:#8D6E00;margin-top:2px}
.checklist-cat{font-size:13px;font-weight:700;padding:8px 0;border-bottom:1px solid var(--brd2);margin-bottom:6px}
.chk-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f5f0eb;cursor:pointer;align-items:flex-start;font-size:13px;transition:var(--tr)}
.chk-item:hover{background:rgba(74,103,65,.02)}
.chk-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--brd);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--tr);margin-top:1px;color:white;font-size:12px}
.chk-box.on{background:var(--green);border-color:var(--green)}
.chk-item.on .chk-text{text-decoration:line-through;color:var(--text3)}
.chk-meta{display:flex;gap:6px;margin-top:3px}
.chk-meta .tipo{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.tipo-cr{background:var(--redbg);color:var(--red)}.tipo-mj{background:#F5F5F5;color:#888}
.chk-meta .ref{font-size:10px;font-weight:600}
.cert-acc{border:1px solid var(--brd2);border-radius:var(--rs);margin-bottom:12px;overflow:hidden}
.cert-acc-hd{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;cursor:pointer;transition:var(--tr)}
.cert-acc-hd:hover{filter:brightness(.98)}
.cert-acc-bd{padding:4px 18px 18px;display:none}
.cert-acc.open .cert-acc-bd{display:block}
.cert-sts{text-align:right;font-size:11px}
.cert-sts .ts{color:var(--blue);font-weight:700}.cert-sts .cs{color:var(--amber);font-weight:600}
.mini-bars{display:flex;gap:4px;margin-top:4px}
.mini-bar{height:4px;flex:1;background:#ddd;border-radius:2px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:2px}
.findings-box{border-radius:var(--rs);padding:16px 20px;margin-bottom:20px}
.finding{display:flex;gap:8px;margin-bottom:5px;font-size:13px;align-items:flex-start}
.finding .ftag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap}
.scores-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.score-card{background:var(--card);border-radius:var(--rs);padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.score-card .sc-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.score-card .sc-value{font-family:var(--fd);font-size:30px;font-weight:700;line-height:1.2}
.score-card .sc-sub{font-size:11px;font-weight:500}
.detail-section{background:var(--card);border-radius:var(--r);padding:22px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.detail-section h3{font-family:var(--fd);font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--brd2)}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.detail-item .di-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.detail-item .di-value{font-size:15px;font-weight:500;margin-top:2px}
.audit-options{display:flex;gap:10px;margin-top:8px}
.audit-opt{flex:1;padding:14px;border-radius:var(--rs);border:2px solid var(--brd);background:transparent;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fb);transition:var(--tr);text-align:center}
.form-actions{display:flex;gap:12px;margin-top:28px;padding-top:20px;border-top:1px solid var(--brd2)}
.form-actions .spacer{flex:1}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:scaleIn .2s ease}
.modal-overlay.hidden{display:none}
.modal{background:var(--card);border-radius:16px;max-width:720px;width:100%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shl)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid var(--brd2)}
.modal-header h2{font-family:var(--fd);font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.modal-close{width:34px;height:34px;border-radius:var(--rs);border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.cert-lib-card{text-align:left;padding:16px 20px;border-radius:var(--rs);border:1px solid var(--brd2);background:var(--card);cursor:pointer;width:100%;transition:var(--tr);margin-bottom:10px;display:block}
.cert-lib-card:hover{box-shadow:var(--sh)}
.cert-info-box{border-radius:var(--rs);padding:16px;margin-bottom:18px}

/* ═══ CHANGE PASSWORD MODAL ═══ */
.pwd-modal{background:var(--card);border-radius:16px;padding:32px;width:400px;max-width:90vw;box-shadow:var(--shl)}
.pwd-modal h3{font-family:var(--fd);font-size:20px;margin-bottom:16px}
.pwd-modal .field{margin-bottom:14px}
.pwd-modal .field label{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:block}
.pwd-modal .field input{width:100%;padding:10px 14px;border-radius:var(--rs);border:1.5px solid var(--brd);font-size:14px;font-family:var(--fb);outline:none}
.pwd-msg{font-size:13px;margin-top:10px;padding:8px 12px;border-radius:6px;display:none}

@media(max-width:768px){.header-inner{padding:10px 16px}.logo h1{font-size:20px}.main{padding:16px}.stats-grid{grid-template-columns:repeat(2,1fr)}.form-card{padding:20px}.form-grid{grid-template-columns:1fr}.login-box{padding:32px 28px}}
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>

<script>
// ═══════════════════════════════════════════════
// AUTHENTICATION SYSTEM
// ═══════════════════════════════════════════════
const AUTH_KEY="cafetrace-auth-v2";
const DEFAULT_CREDS={user:"admin",pass:"zxUeYABkP4fx"};

function getAuth(){try{const d=localStorage.getItem(AUTH_KEY);return d?JSON.parse(d):{...DEFAULT_CREDS,lastAccess:null}}catch(e){return{...DEFAULT_CREDS,lastAccess:null}}}
function setAuth(data){localStorage.setItem(AUTH_KEY,JSON.stringify(data))}
function isLoggedIn(){const s=sessionStorage.getItem('cafetrace-session');const r=localStorage.getItem('cafetrace-remember');return s==='active'||r==='active'}

function doLogin(){
const user=document.getElementById('loginUser').value.trim();
const pass=document.getElementById('loginPass').value;
const remember=document.getElementById('loginRemember').checked;
const auth=getAuth();
if(user===auth.user&&pass===auth.pass){
sessionStorage.setItem('cafetrace-session','active');
if(remember)localStorage.setItem('cafetrace-remember','active');
auth.lastAccess=new Date().toLocaleString('es-PE');
setAuth(auth);
showApp();
}else{
const err=document.getElementById('loginError');
err.classList.add('show');
err.style.display='block';
document.getElementById('loginPass').value='';
setTimeout(()=>{err.classList.remove('show')},400);
}}

function doLogout(){
sessionStorage.removeItem('cafetrace-session');
localStorage.removeItem('cafetrace-remember');
document.getElementById('appContainer').classList.add('hidden');
document.getElementById('loginScreen').classList.remove('hidden');
document.getElementById('loginPass').value='';
document.getElementById('loginError').style.display='none';
}

function showApp(){
document.getElementById('loginScreen').classList.add('hidden');
document.getElementById('appContainer').classList.remove('hidden');
const auth=getAuth();
document.getElementById('adminName').textContent=auth.user;
document.getElementById('lastAccess').textContent=auth.lastAccess||'Primera vez';
loadData();
}

function openChangePwd(){document.getElementById('pwdOverlay').classList.remove('hidden');document.getElementById('pwdOld').value='';document.getElementById('pwdNew').value='';document.getElementById('pwdConfirm').value='';document.getElementById('pwdMsg').style.display='none'}
function closePwdModal(){document.getElementById('pwdOverlay').classList.add('hidden')}
function changePwd(){
const auth=getAuth();const msg=document.getElementById('pwdMsg');
const old=document.getElementById('pwdOld').value;
const nw=document.getElementById('pwdNew').value;
const conf=document.getElementById('pwdConfirm').value;
if(old!==auth.pass){msg.style.display='block';msg.style.background='var(--redbg)';msg.style.color='var(--red)';msg.textContent='❌ Contraseña actual incorrecta';return}
if(nw.length<6){msg.style.display='block';msg.style.background='var(--warnbg)';msg.style.color='var(--warn)';msg.textContent='⚠️ La nueva contraseña debe tener al menos 6 caracteres';return}
if(nw!==conf){msg.style.display='block';msg.style.background='var(--redbg)';msg.style.color='var(--red)';msg.textContent='❌ Las contraseñas no coinciden';return}
auth.pass=nw;setAuth(auth);
msg.style.display='block';msg.style.background='var(--okbg)';msg.style.color='var(--ok)';msg.textContent='✅ Contraseña cambiada exitosamente';
setTimeout(closePwdModal,1500);
}

// Check session on load
if(isLoggedIn()){showApp()}

const FM={
rendCP:(c,p)=>c&&p&&+c>0?((+p/+c)*100).toFixed(2):null,
clasSCA:p=>{if(!p)return{c:"—",col:"#999"};p=+p;if(p>=90)return{c:"Outstanding",col:"#1B5E20"};if(p>=85)return{c:"Excellent",col:"#2E7D32"};if(p>=80)return{c:"Very Good",col:"#558B2F"};return{c:"Below Spec.",col:"#BF360C"}},
clasAlt:a=>{if(!a)return{c:"—",s:"",col:"#999"};a=+a;if(a>=1500)return{c:"Strictly Hard Bean",s:"SHB",col:"#1B5E20"};if(a>=1200)return{c:"Hard Bean",s:"HB",col:"#2E7D32"};return{c:"Standard",s:"STD",col:"#9E9D24"}},
valHum:h=>{if(!h)return{m:"—",col:"#999",ok:null};h=+h;if(h>=10&&h<=12.5)return{m:h+"% OK",col:"#2E7D32",ok:1};return{m:h+"% Fuera rango",col:"#C62828",ok:0}},
comp:l=>{const c=[l.productor,l.finca,l.region,l.altitud,l.variedad,l.fechaCosecha,l.pesoKgCereza,l.proceso,l.humedadFinal,l.pesoKgPergamino,l.puntajeTaza,l.transportista,l.fechaDespacho,l.destino];return Math.round(c.filter(x=>x&&x!=="").length/c.length*100)},
riesgo:l=>{let r=0;const h=+l.humedadFinal;if(h&&(h<9||h>13))r+=20;const rn=+FM.rendCP(l.pesoKgCereza,l.pesoKgPergamino);if(rn&&(rn<16||rn>25))r+=20;if(FM.comp(l)<50)r+=25;else if(FM.comp(l)<75)r+=10;if(+l.puntajeTaza&&+l.puntajeTaza<70)r+=15;return Math.min(r,100)},
riesgoL:s=>{if(s<=15)return{l:"Bajo",col:"#2E7D32",bg:"#E8F5E9"};if(s<=35)return{l:"Moderado",col:"#F57F17",bg:"#FFF8E1"};if(s<=60)return{l:"Alto",col:"#E65100",bg:"#FFF3E0"};return{l:"Crítico",col:"#C62828",bg:"#FFEBEE"}},
certStats:(lot,cn)=>{const db=CERTS[cn];if(!db)return{};let tT=0,tD=0,tCr=0,tCrD=0,cT=0,cD=0,cCr=0,cCrD=0;db.traz.forEach(s=>s.items.forEach(it=>{tT++;if(lot.checks&&lot.checks[it.id])tD++;if(it.cr){tCr++;if(lot.checks&&lot.checks[it.id])tCrD++}}));db.comp.forEach(s=>s.items.forEach(it=>{cT++;if(lot.checks&&lot.checks[it.id])cD++;if(it.cr){cCr++;if(lot.checks&&lot.checks[it.id])cCrD++}}));return{tT,tD,tCr,tCrD,cT,cD,cCr,cCrD,tPct:tT>0?Math.round(tD/tT*100):0,cPct:cT>0?Math.round(cD/cT*100):0}},
certTrazPct:(l,cn)=>{const st=FM.certStats(l,cn);return st.tPct||0}
};

function genId(){return'LOT-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).substring(2,5).toUpperCase()}
function emptyLot(){return{id:genId(),fechaRegistro:new Date().toISOString().split('T')[0],productor:"",finca:"",region:"",altitud:"",parcela:"",variedad:"",fechaCosecha:"",metodoCosecha:"Selectivo",pesoKgCereza:"",proceso:"",fechaDespulpado:"",tiempoFermentacion:"",fechaSecado:"",humedadFinal:"",pesoKgPergamino:"",pesoKgVerde:"",puntajeTaza:"",defectos:"",notasCata:"",tamanoGrano:"",certificaciones:[],transportista:"",placaVehiculo:"",fechaDespacho:"",destino:"",temperaturaTransporte:"",estadoAuditoria:"pendiente",observacionesAuditoria:"",auditor:"",fechaAuditoria:"",checks:{}}}

const SK="cafetrace-v5-data";
async function loadData(){try{if(window.storage){const r=await window.storage.get(SK);if(r&&r.value)lots=JSON.parse(r.value)}else{const d=localStorage.getItem(SK);if(d)lots=JSON.parse(d)}}catch(e){try{const d=localStorage.getItem(SK);if(d)lots=JSON.parse(d)}catch(e2){}}renderDash()}
async function saveData(){try{if(window.storage)await window.storage.set(SK,JSON.stringify(lots));localStorage.setItem(SK,JSON.stringify(lots))}catch(e){localStorage.setItem(SK,JSON.stringify(lots))}}

function showView(v){['viewDash','viewForm','viewDetail','viewAudit'].forEach(id=>document.getElementById(id).classList.add('hidden'));document.getElementById('view'+v).classList.remove('hidden');document.getElementById('btnBack').classList.toggle('hidden',v==='Dash')}
function goHome(){showView('Dash');currentLot=null;renderDash()}
function addLot(){currentLot=emptyLot();currentStep=0;renderForm()}
function editLot(id){currentLot=JSON.parse(JSON.stringify(lots.find(l=>l.id===id)));currentStep=0;renderForm()}
function viewLot(id){currentLot=lots.find(l=>l.id===id);renderDetail()}
function auditLot(id){currentLot=JSON.parse(JSON.stringify(lots.find(l=>l.id===id)));renderAudit()}
function deleteLot(id){if(confirm('¿Eliminar lote '+id+'?')){lots=lots.filter(l=>l.id!==id);saveData();renderDash()}}
function saveLot(){const idx=lots.findIndex(l=>l.id===currentLot.id);if(idx>=0)lots[idx]=currentLot;else lots.push(currentLot);saveData();goHome()}
function toggleCert(c){if(!currentLot.certificaciones)currentLot.certificaciones=[];const i=currentLot.certificaciones.indexOf(c);if(i>=0)currentLot.certificaciones.splice(i,1);else currentLot.certificaciones.push(c);renderForm()}
function toggleAuditCheck(id){if(!currentLot.checks)currentLot.checks={};currentLot.checks[id]=!currentLot.checks[id];renderAudit()}

if(FM.valHum(l.humedadFinal).ok===0)findings.push({t:'cr',m:'Humedad fuera de rango'});
const rend=FM.rendCP(l.pesoKgCereza,l.pesoKgPergamino);if(rend&&(+rend<16||+rend>25))findings.push({t:'cr',m:`Rendimiento anormal: ${rend}%`});
if(l.certificaciones)l.certificaciones.forEach(cn=>{const st=FM.certStats(l,cn);if(st.tCr>st.tCrD)findings.push({t:'cr',m:`${cn}: ${st.tCr-st.tCrD} CRÍTICO(s) TRAZABILIDAD pendiente(s)`});if(st.cCr>st.cCrD)findings.push({t:'ob',m:`${cn}: ${st.cCr-st.cCrD} crítico(s) cumplimiento pendiente(s)`})});
if(!findings.length)findings.push({t:'ok',m:'Todo verificado correctamente.'});

let h=`<div class="anim-up"><div class="form-card"><div class="form-title">🛡 Auditoría</div><div class="form-desc"><b>${l.id}</b> — ${l.productor||'—'} — ${l.region||'—'}</div>
<div class="findings-box" style="background:${ri.bg}80;border:1px solid ${ri.col}25"><div style="font-size:14px;font-weight:700;color:${ri.col};margin-bottom:10px">⚡ Análisis Automático — Riesgo: ${FM.riesgo(l)}/100 (${ri.l})</div>
${findings.map(f=>`<div class="finding"><span class="ftag" style="background:${f.t==='cr'?'var(--redbg)':f.t==='ok'?'var(--okbg)':'var(--warnbg)'};color:${f.t==='cr'?'var(--red)':f.t==='ok'?'var(--ok)':'var(--warn)'}">${f.t==='cr'?'CRÍTICO':f.t==='ok'?'OK':'OBS'}</span><span>${f.m}</span></div>`).join('')}</div>`;

if(l.certificaciones&&l.certificaciones.length){h+=`<h3 style="font-family:var(--fd);font-size:18px;margin-bottom:14px">📋 Criterios por Certificación</h3>`;
l.certificaciones.forEach(cn=>{const db=CERTS[cn];if(!db)return;const st=FM.certStats(l,cn);
h+=`<div class="cert-acc" id="acc_${db.id}"><div class="cert-acc-hd" style="background:${db.color}06" onclick="document.getElementById('acc_${db.id}').classList.toggle('open')">
<div><div style="font-weight:700;font-size:15px;color:${db.color}">${cn}</div><div style="font-size:11px;color:var(--text3)">${db.norma}</div></div>
<div class="cert-sts"><div class="ts">Traz: ${st.tD}/${st.tT} (${st.tPct}%) · Crít: ${st.tCrD}/${st.tCr}</div><div class="cs">Cumpl: ${st.cD}/${st.cT} (${st.cPct}%) · Crít: ${st.cCrD}/${st.cCr}</div>
<div class="mini-bars"><div class="mini-bar"><div class="mini-bar-fill" style="width:${st.tPct}%;background:var(--blue)"></div></div><div class="mini-bar"><div class="mini-bar-fill" style="width:${st.cPct}%;background:var(--amber2,#F9A825)"></div></div></div></div></div>
<div class="cert-acc-bd"><div style="text-align:right;margin-bottom:10px"><button class="btn btn-secondary btn-sm" onclick="openModal('${cn}')">📖 Norma</button></div>
<div class="section-header-traz"><div class="title">🔗 TRAZABILIDAD PURA</div><div class="sub">Cadena custodia · Balance masa · Segregación · Documentación</div></div>`;
db.traz.forEach(sec=>{h+=`<div class="checklist-cat">${sec.cat}</div>`;sec.items.forEach(it=>{const chk=l.checks&&l.checks[it.id];h+=`<div class="chk-item${chk?' on':''}" onclick="toggleAuditCheck('${it.id}')"><div class="chk-box${chk?' on':''}" style="${chk?`background:${db.color};border-color:${db.color}`:''}">${chk?'✓':''}</div><div><div class="chk-text">${it.t}</div><div class="chk-meta"><span class="tipo ${it.cr?'tipo-cr':'tipo-mj'}">${it.cr?'CRÍTICO':'MEJORA'}</span><span class="ref" style="color:${db.color}">Ref: ${it.ref}</span></div></div></div>`})});
h+=`<div class="section-header-comp"><div class="title">🔒 CUMPLIMIENTO</div><div class="sub">Social · Ambiental · Gestión</div></div>`;
db.comp.forEach(sec=>{h+=`<div class="checklist-cat">${sec.cat}</div>`;sec.items.forEach(it=>{const chk=l.checks&&l.checks[it.id];h+=`<div class="chk-item${chk?' on':''}" onclick="toggleAuditCheck('${it.id}')"><div class="chk-box${chk?' on':''}" style="${chk?`background:${db.color};border-color:${db.color}`:''}">${chk?'✓':''}</div><div><div class="chk-text">${it.t}</div><div class="chk-meta"><span class="tipo ${it.cr?'tipo-cr':'tipo-mj'}">${it.cr?'CRÍTICO':'MEJORA'}</span><span class="ref" style="color:${db.color}">Ref: ${it.ref}</span></div></div></div>`})});
h+=`</div></div>`})}else{h+=`<div style="padding:20px;background:var(--amberbg);border-radius:var(--rs);margin-bottom:20px;color:var(--amber)">⚠️ Sin certificaciones. Edita el lote para asignarlas.</div>`}

h+=`<div class="form-grid" style="margin-top:20px"><div class="field"><label>Auditor</label><input value="${l.auditor||''}" oninput="currentLot.auditor=this.value"></div><div class="field"><label>Fecha</label><input type="date" value="${l.fechaAuditoria||''}" oninput="currentLot.fechaAuditoria=this.value"></div></div>
<div style="margin-top:18px"><label style="font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.6px">Resultado</label>
<div class="audit-options">
${[{v:'aprobado',l:'✅ Aprobado',c:'#2E7D32'},{v:'observado',l:'⚠️ Observado',c:'#E65100'},{v:'rechazado',l:'❌ Rechazado',c:'#C62828'}].map(o=>`<div class="audit-opt" style="${l.estadoAuditoria===o.v?`border-color:${o.c};background:${o.c}12;color:${o.c}`:''}" onclick="currentLot.estadoAuditoria='${o.v}';renderAudit()">${o.l}</div>`).join('')}
</div></div>
<div class="field field-full" style="margin-top:16px"><label>Observaciones</label><textarea oninput="currentLot.observacionesAuditoria=this.value">${l.observacionesAuditoria||''}</textarea></div>
<div class="form-actions"><div class="spacer"></div><button class="btn btn-primary" onclick="saveLot()">🛡 Guardar Auditoría</button></div></div></div>`;
document.getElementById('viewAudit').innerHTML=h;showView('Audit')}

// ═══ MODAL ═══
function openModal(what){const ov=document.getElementById('modalOverlay'),ti=document.getElementById('modalTitle'),bd=document.getElementById('modalBody');ov.classList.remove('hidden');
if(what==='library'){ti.innerHTML='📖 Normas y Certificaciones';let h=`<p style="font-size:14px;color:var(--text2);margin-bottom:16px">Criterios en <b style="color:var(--blue)">TRAZABILIDAD</b> y <b style="color:var(--amber)">CUMPLIMIENTO</b>.</p>`;
Object.entries(CERTS).forEach(([k,c])=>{const tC=c.traz.reduce((a,s)=>a+s.items.length,0),cC=c.comp.reduce((a,s)=>a+s.items.length,0);
h+=`<div class="cert-lib-card" style="border-left:4px solid ${c.color}" onclick="openModal('${k}')"><div style="font-weight:700;font-size:15px;color:${c.color}">${k}</div><div style="font-size:12px;color:var(--text2);margin-top:2px">${c.norma}</div><div style="font-size:11px;color:var(--text3);margin-top:3px">${c.desc}</div><div style="display:flex;gap:12px;margin-top:6px;font-size:11px"><span style="color:var(--blue);font-weight:700">🔗 ${tC} trazabilidad</span><span style="color:var(--amber);font-weight:700">🔒 ${cC} cumplimiento</span></div></div>`});bd.innerHTML=h}
else{const db=CERTS[what];if(!db)return;ti.innerHTML=`📖 ${what}`;
let h=`<button class="btn btn-secondary btn-sm" onclick="openModal('library')" style="margin-bottom:14px">← Todas</button>
<div class="cert-info-box" style="background:${db.color}08;border:1px solid ${db.color}20"><div style="font-size:14px;font-weight:700;color:${db.color}">${db.norma}</div><div style="font-size:13px;margin-top:4px">${db.desc}</div><div style="font-size:12px;color:var(--text2);margin-top:6px"><b>Vigencia:</b> ${db.vigencia} · <b>Organismos:</b> ${db.org}</div></div>
<div class="section-header-traz"><div class="title">🔗 TRAZABILIDAD PURA</div><div class="sub">Cadena custodia · Balance masa · Segregación · Documentación</div></div>`;
db.traz.forEach(sec=>{h+=`<div class="checklist-cat">${sec.cat}</div>`;sec.items.forEach(it=>{h+=`<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f5f0eb;font-size:13px"><span class="tipo ${it.cr?'tipo-cr':'tipo-mj'}" style="min-width:54px;text-align:center">${it.cr?'CRÍTICO':'MEJORA'}</span><div style="flex:1"><div>${it.t}</div><div style="font-size:11px;color:${db.color};font-weight:600;margin-top:2px">Ref: ${it.ref}</div></div></div>`})});
h+=`<div class="section-header-comp" style="margin-top:10px"><div class="title">🔒 CUMPLIMIENTO COMPLEMENTARIO</div><div class="sub">Social · Ambiental · Gestión · Calidad</div></div>`;
db.comp.forEach(sec=>{h+=`<div class="checklist-cat">${sec.cat}</div>`;sec.items.forEach(it=>{h+=`<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f5f0eb;font-size:13px"><span class="tipo ${it.cr?'tipo-cr':'tipo-mj'}" style="min-width:54px;text-align:center">${it.cr?'CRÍTICO':'MEJORA'}</span><div style="flex:1"><div>${it.t}</div><div style="font-size:11px;color:${db.color};font-weight:600;margin-top:2px">Ref: ${it.ref}</div></div></div>`})});
bd.innerHTML=h}}
function closeModal(){document.getElementById('modalOverlay').classList.add('hidden')}
</script>
</body></html>
