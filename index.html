<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaféTrace by CRISSTECH</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F2EC;--bg2:#EDE8E0;--card:#FFF;--card2:#FAFAF7;--tx:#2A2318;--tx2:#6B5D4F;--tx3:#9C8E7E;--gr:#4A6741;--gr2:#3B5534;--grl:#EFF5ED;--gd:#8B7355;--gdl:#C4A97D;--bl:#0D47A1;--blbg:#E3F2FD;--am:#6D4C00;--ambg:#FFF8E1;--rd:#C62828;--rdbg:#FFEBEE;--ok:#2E7D32;--okbg:#E8F5E9;--wn:#E65100;--wnbg:#FFF3E0;--bd:#D8D0C5;--bd2:#EDE8E0;--r:12px;--rs:8px;--sh:0 2px 12px rgba(0,0,0,.06);--fd:'Playfair Display',serif;--fb:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--fb);background:linear-gradient(170deg,var(--bg),var(--bg2));color:var(--tx);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes sc{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.afu{animation:fu .4s ease both}
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0F1A0E,#1C2B1B 40%,#0D150D);position:relative;overflow:hidden}
.login-bg::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(196,169,125,.05),transparent 70%);top:-120px;right:-120px}
.lbox{background:rgba(255,255,255,.03);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:48px 44px;width:420px;max-width:92vw;position:relative;z-index:1;box-shadow:0 24px 80px rgba(0,0,0,.3)}
.lbox .ll{text-align:center;margin-bottom:36px}
.lbox .ll .brand{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gdl);font-weight:700;margin-bottom:16px}
.lbox .ll h1{font-family:var(--fd);font-size:32px;font-weight:700;color:#F5F0EB}
.lbox .ll p{font-size:11px;color:#7A8F72;letter-spacing:1.5px;text-transform:uppercase;margin-top:6px}
.lf{margin-bottom:18px}.lf label{display:block;font-size:10px;font-weight:700;color:#7A8F72;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.lf input{width:100%;padding:13px 16px;border-radius:10px;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#F5F0EB;font-size:14px;font-family:var(--fb);outline:none;transition:all .2s}
.lf input:focus{border-color:var(--gdl);box-shadow:0 0 0 3px rgba(196,169,125,.1)}
.lf input::placeholder{color:rgba(255,255,255,.18)}
.lbtn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--gr),var(--gr2));color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--fb);transition:all .2s;margin-top:8px}
.lbtn:hover{box-shadow:0 4px 20px rgba(74,103,65,.4);transform:translateY(-1px)}
.lerr{background:rgba(198,40,40,.1);border:1px solid rgba(198,40,40,.2);border-radius:8px;padding:10px;color:#ff8a80;font-size:12px;margin-bottom:14px;display:none;text-align:center}
.lerr.show{display:block;animation:shake .35s ease}
.lrem{display:flex;align-items:center;gap:6px;font-size:11px;color:#7A8F72;margin-top:12px;justify-content:center}.lrem input{accent-color:var(--gr)}
.lfoot{text-align:center;margin-top:24px;font-size:10px;color:rgba(255,255,255,.12)}.lfoot .pw{font-size:10px;color:rgba(255,255,255,.2);margin-top:8px;letter-spacing:1px}
/* HEADER */
.hdr{background:linear-gradient(135deg,#0F1A0E,#1C2B1B,#0D150D);position:sticky;top:0;z-index:100;border-bottom:2px solid var(--gd)}
.hdr-in{max-width:1320px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px;cursor:default;user-select:none}
.logo-ic{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;color:var(--gdl)}
.logo h1{font-family:var(--fd);font-size:21px;font-weight:700;color:#F5F0EB}
.logo .by{font-size:9px;color:var(--gdl);letter-spacing:2px;text-transform:uppercase;font-weight:600}
.logo p{font-size:9px;color:#7A8F72;letter-spacing:1.2px;text-transform:uppercase}
.hdr-act{display:flex;gap:6px;align-items:center}
.hbtn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--rs);border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#F5F0EB;font-size:12px;cursor:pointer;font-family:var(--fb);transition:all .2s}
.hbtn:hover{background:rgba(255,255,255,.1)}
.hbtn.gold{border-color:rgba(196,169,125,.2);background:rgba(196,169,125,.06);color:var(--gdl);font-weight:600}
.main{max-width:1320px;margin:0 auto;padding:20px 24px}.hidden{display:none!important}
/* SECRET ADMIN PANEL */
.secret-panel{position:fixed;top:0;right:-360px;width:350px;height:100vh;background:var(--card);box-shadow:-4px 0 30px rgba(0,0,0,.15);z-index:300;transition:right .3s ease;display:flex;flex-direction:column;overflow:hidden}
.secret-panel.open{right:0}
.sp-header{padding:20px;border-bottom:1px solid var(--bd2);background:linear-gradient(135deg,#1C2B1B,#2D3D2C);color:white}
.sp-header h3{font-family:var(--fd);font-size:18px;display:flex;align-items:center;gap:8px}
.sp-header .sp-sub{font-size:11px;color:#A9B89F;margin-top:4px}
.sp-close{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:transparent;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.sp-body{flex:1;overflow-y:auto;padding:16px 20px}
.sp-section{margin-bottom:20px}
.sp-section h4{font-size:13px;font-weight:700;color:var(--gr);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd2)}
.sp-item{padding:10px 12px;border-radius:var(--rs);border:1px solid var(--bd2);margin-bottom:8px;cursor:pointer;transition:all .15s;font-size:13px}
.sp-item:hover{background:var(--grl);border-color:var(--gr)}
.sp-item.dng:hover{background:var(--rdbg);border-color:var(--rd)}
.sp-client{padding:12px;border-radius:var(--rs);border:1px solid var(--bd2);margin-bottom:8px;background:var(--card2)}
.sp-client .spc-name{font-weight:700;font-size:14px}
.sp-client .spc-info{font-size:11px;color:var(--tx3);margin-top:2px}
.sp-client .spc-stats{font-size:11px;color:var(--tx2);margin-top:4px}
.sp-client .spc-actions{display:flex;gap:6px;margin-top:8px}
.sp-client .spc-actions button{padding:4px 10px;border-radius:5px;border:1px solid var(--bd);background:transparent;font-size:11px;cursor:pointer;font-family:var(--fb);transition:all .15s}
.sp-client .spc-actions button:hover{background:var(--grl)}
.sp-client .spc-actions .dng-btn{color:var(--rd);border-color:rgba(198,40,40,.3)}
.sp-client .spc-actions .dng-btn:hover{background:var(--rdbg)}
.sp-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:250;display:none}
.sp-overlay.open{display:block}
/* Client bar */
.client-bar{background:var(--grl);border-bottom:1px solid #D4E8CF;padding:8px 24px;display:flex;align-items:center;gap:8px;font-size:13px}
.client-bar .cb-ico{width:28px;height:28px;border-radius:50%;background:var(--gr);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.client-bar .cb-name{font-weight:700;color:var(--gr)}
.client-bar .cb-info{font-size:11px;color:var(--tx3)}
/* COMPONENTS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:var(--sh);transition:all .2s}
.stat-card:hover{transform:translateY(-2px)}.stat-card .sv{font-family:var(--fd);font-size:32px;font-weight:700;line-height:1.1}
.stat-card .sl{font-size:11px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.stat-card .ss{font-size:11px;font-weight:600;margin-top:3px}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}.srch{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:var(--rs);padding:9px 14px;flex:1;min-width:220px;border:1px solid var(--bd)}
.srch:focus-within{border-color:var(--gr);box-shadow:0 0 0 3px rgba(74,103,65,.08)}
.srch input{border:none;outline:none;font-size:13px;font-family:var(--fb);flex:1;background:transparent}
.tl-r{display:flex;gap:8px;flex-wrap:wrap}
select.fsel{padding:9px 12px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--card);font-size:13px;font-family:var(--fb);cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:var(--rs);border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fb);transition:all .2s}
.btn-p{background:linear-gradient(135deg,var(--gr),var(--gr2));color:white;box-shadow:0 2px 6px rgba(74,103,65,.2)}
.btn-p:hover{box-shadow:0 4px 14px rgba(74,103,65,.3);transform:translateY(-1px)}
.btn-s{background:transparent;border:1.5px solid var(--bd);color:var(--gr)}.btn-s:hover{border-color:var(--gr);background:var(--grl)}
.btn-sm{padding:5px 10px;font-size:11px}
.bi{width:30px;height:30px;padding:0;border-radius:6px;border:1px solid var(--bd2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gr);transition:all .15s;font-size:14px}
.bi:hover{background:var(--grl)}.bi.dng{color:var(--rd)}.bi.dng:hover{background:var(--rdbg)}
.tw{background:var(--card);border-radius:var(--r);overflow-x:auto;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse}th{text-align:left;padding:12px 14px;border-bottom:2px solid var(--bd2);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--bd2);vertical-align:middle;font-size:12px}
.lid{font-weight:600;font-size:10px;color:var(--gr);background:var(--grl);padding:2px 8px;border-radius:5px;white-space:nowrap}
.bdg{display:inline-block;padding:3px 10px;border-radius:16px;font-size:10px;font-weight:600}
.bdg-pe{background:#FFF3CD;color:#856404}.bdg-ap{background:#D4EDDA;color:#155724}.bdg-ob{background:#FFE0B2;color:#E65100}.bdg-re{background:#F8D7DA;color:#721C24}
.rbdg{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.pb{height:5px;border-radius:3px;background:var(--bd2);overflow:hidden}.pf{height:100%;border-radius:3px;transition:width .4s}
.ct{font-size:8px;font-weight:700;padding:2px 6px;border-radius:5px;white-space:nowrap;display:inline-block;margin:1px}
.empty{text-align:center;padding:60px 20px;background:var(--card);border-radius:var(--r)}.empty h3{font-family:var(--fd);font-size:22px;font-weight:600;margin:16px 0 8px}.empty p{color:var(--tx2);font-size:14px;max-width:380px;margin:0 auto 20px;line-height:1.5}
.fc{background:var(--card);border-radius:var(--r);padding:28px;box-shadow:var(--sh)}
.ft{font-family:var(--fd);font-size:22px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.fdsc{color:var(--tx2);font-size:13px;margin-bottom:20px}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.fld{display:flex;flex-direction:column}.fld label{font-size:10px;font-weight:700;color:var(--gr);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.fld input,.fld select,.fld textarea{padding:9px 12px;border-radius:var(--rs);border:1.5px solid var(--bd);font-size:13px;font-family:var(--fb);color:var(--tx);background:var(--card2);outline:none;transition:all .2s}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gr);box-shadow:0 0 0 3px rgba(74,103,65,.08)}
.fld textarea{min-height:70px;resize:vertical}.fld-f{grid-column:1/-1}
.stepper{display:flex;justify-content:center;gap:6px;margin-bottom:24px}
.st-i{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;min-width:70px}
.st-c{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bd2);color:var(--tx3);transition:all .2s;font-size:18px}
.st-c.on{background:var(--gr);color:white;box-shadow:0 3px 10px rgba(74,103,65,.3)}.st-c.dn{background:#A9B89F;color:white}
.st-l{font-size:11px;color:var(--gr);font-weight:500}.st-l.on{font-weight:700}
.livb{display:flex;flex-wrap:wrap;gap:14px;background:var(--card);border-radius:var(--rs);padding:10px 16px;margin-bottom:16px;align-items:center;box-shadow:var(--sh);font-size:12px}
.livb .tg{font-size:9px;font-weight:700;color:var(--gd);text-transform:uppercase;letter-spacing:.8px}
.cb2{margin-top:16px;border:1px solid var(--bd);border-radius:var(--rs);padding:14px 16px;background:var(--card2)}
.cb2 .cbt{display:flex;align-items:center;gap:6px;font-weight:700;font-size:13px;color:var(--gr);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd2)}
.cbr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed var(--bd2);flex-wrap:wrap;gap:4px;font-size:12px}
.cbr .cl{color:var(--tx2)}.cbr .cv{font-weight:600}.cbr .cn{font-size:10px;color:var(--tx3)}
/* Cert chips — toggleable without re-render */
.cchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.cchip{padding:7px 14px;border-radius:var(--rs);border:2px solid var(--bd);background:transparent;font-size:12px;cursor:pointer;font-family:var(--fb);color:var(--tx2);transition:all .15s}
.cchip.sel{font-weight:700}
.csum{margin-top:12px;padding:12px 14px;background:var(--card2);border-radius:var(--rs);border:1px solid var(--bd2);font-size:12px}
.sh-t{background:var(--blbg);border-radius:var(--rs);padding:8px 14px;margin:12px 0 8px}
.sh-t .stl{font-size:13px;font-weight:800;color:var(--bl)}.sh-t .ssb{font-size:10px;color:#1565C0;margin-top:1px}
.sh-c{background:var(--ambg);border-radius:var(--rs);padding:8px 14px;margin:12px 0 8px}
.sh-c .stl{font-size:13px;font-weight:800;color:var(--am)}.sh-c .ssb{font-size:10px;color:#8D6E00;margin-top:1px}
.clcat{font-size:12px;font-weight:700;padding:6px 0;border-bottom:1px solid var(--bd2);margin-bottom:4px}
.ci{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f5f0eb;cursor:pointer;align-items:flex-start;font-size:12px;transition:all .15s}
.ci:hover{background:rgba(74,103,65,.015)}
.cbox{width:20px;height:20px;border-radius:5px;border:2px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;color:white;font-size:11px}.cbox.on{border-color:var(--gr);background:var(--gr)}
.ci.on .ctx{text-decoration:line-through;color:var(--tx3)}
.cmeta{display:flex;gap:5px;margin-top:2px}.cmeta .tp{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px}
.tp-c{background:var(--rdbg);color:var(--rd)}.tp-m{background:#F5F5F5;color:#999}
.cmeta .rf{font-size:9px;font-weight:600}
.cacc{border:1px solid var(--bd2);border-radius:var(--rs);margin-bottom:10px;overflow:hidden}
.cacc-h{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer}
.cacc-b{padding:4px 16px 16px;display:none}.cacc.open .cacc-b{display:block}
.fbx{border-radius:var(--rs);padding:14px 16px;margin-bottom:16px}
.fnd{display:flex;gap:6px;margin-bottom:4px;font-size:12px;align-items:flex-start}
.fnd .ft2{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap}
.scg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.scc{background:var(--card);border-radius:var(--rs);padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.scc .scl{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px}
.scc .scv{font-family:var(--fd);font-size:26px;font-weight:700;line-height:1.2}.scc .scs{font-size:10px;font-weight:500}
.ds{background:var(--card);border-radius:var(--r);padding:20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.ds h3{font-family:var(--fd);font-size:16px;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd2)}
.dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.di .dl{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px}.di .dv{font-size:14px;font-weight:500;margin-top:2px}
.aopts{display:flex;gap:8px;margin-top:6px}
.aopt{flex:1;padding:12px;border-radius:var(--rs);border:2px solid var(--bd);background:transparent;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fb);transition:all .15s;text-align:center}
.fa{display:flex;gap:10px;margin-top:24px;padding-top:16px;border-top:1px solid var(--bd2)}.fa .sp{flex:1}
.mov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;animation:sc .15s ease}
.mov.hidden{display:none}
.mod{background:var(--card);border-radius:14px;max-width:680px;width:100%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.15)}
.mod-h{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--bd2)}
.mod-h h2{font-family:var(--fd);font-size:18px;font-weight:700}
.mod-x{width:30px;height:30px;border-radius:var(--rs);border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.mod-b{padding:16px 20px;overflow-y:auto;flex:1}
.clc{text-align:left;padding:14px 16px;border-radius:var(--rs);border:1px solid var(--bd2);background:var(--card);cursor:pointer;width:100%;transition:all .2s;margin-bottom:8px;display:block}.clc:hover{box-shadow:var(--sh)}
.footer{text-align:center;padding:20px;font-size:11px;color:var(--tx3);border-top:1px solid var(--bd2);margin-top:40px}
.footer .f-brand{font-weight:700;color:var(--gr);letter-spacing:1px}
/* Secret panel form */
.sp-fld{margin-bottom:10px}.sp-fld label{display:block;font-size:10px;font-weight:700;color:var(--gr);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sp-fld input{width:100%;padding:8px 10px;border-radius:6px;border:1.5px solid var(--bd);font-size:13px;font-family:var(--fb);outline:none}
.sp-fld input:focus{border-color:var(--gr)}
.sp-msg{font-size:12px;padding:6px 10px;border-radius:5px;margin-top:8px;display:none}
@media(max-width:768px){.hdr-in{padding:8px 14px}.main{padding:14px}.stats-grid{grid-template-columns:repeat(2,1fr)}.fc{padding:18px}.fg{grid-template-columns:1fr}.lbox{padding:32px 24px}.secret-panel{width:300px}}
</style>
</head>
<body>

<div class="brand">CRISSTECH</div>

// ═══ AUTH ═══
const AK="ct-a3",DK="ct-d3",CK="ct-c3",ADMIN={user:"admin",pass:"zxUeYABkP4fx"};

function gA(){try{return JSON.parse(localStorage.getItem(AK))||{...ADMIN,la:null}}catch{return{...ADMIN,la:null}}}

function gC(){try{return JSON.parse(localStorage.getItem(CK))||[]}catch{return[]}}
function sC(c){localStorage.setItem(CK,JSON.stringify(c))}
function isIn(){return sessionStorage.getItem('s')==='1'||localStorage.getItem('r')==='1'}

function doLogin(){
const u=document.getElementById('loginUser').value.trim().toLowerCase(),p=document.getElementById('loginPass').value,rem=document.getElementById('loginRem').checked;
const a=gA();
if(u===a.user&&p===a.pass){cUser={user:a.user,role:'admin',empresa:'CRISSTECH'};a.la=new Date().toLocaleString('es-PE');sA(a);sessionStorage.setItem('s','1');sessionStorage.setItem('u',JSON.stringify(cUser));if(rem)localStorage.setItem('r','1');showApp();return}
const cls=gC(),cl=cls.find(c=>c.user.toLowerCase()===u&&c.pass===p);
if(cl){cUser={user:cl.user,role:'client',empresa:cl.empresa,contacto:cl.contacto,region:cl.region,id:cl.id};cl.la=new Date().toLocaleString('es-PE');sC(cls);sessionStorage.setItem('s','1');sessionStorage.setItem('u',JSON.stringify(cUser));if(rem)localStorage.setItem('r','1');showApp();return}
const e=document.getElementById('loginError');e.classList.add('show');e.style.display='block';document.getElementById('loginPass').value='';setTimeout(()=>e.classList.remove('show'),350)}

function doLogout(){sessionStorage.clear();localStorage.removeItem('r');cUser=null;closeSecretPanel();document.getElementById('appC').classList.add('hidden');document.getElementById('loginScreen').classList.remove('hidden');document.getElementById('loginPass').value='';document.getElementById('loginError').style.display='none'}

function showApp(){
document.getElementById('loginScreen').classList.add('hidden');document.getElementById('appC').classList.remove('hidden');
const isA=cUser.role==='admin';
const cb=document.getElementById('clientBar');
if(!isA){cb.classList.remove('hidden');document.getElementById('cbIco').textContent=cUser.empresa.charAt(0);document.getElementById('cbName').textContent=cUser.empresa;document.getElementById('cbInfo').textContent=(cUser.contacto||'')+' · '+(cUser.region||'')}
else cb.classList.add('hidden');
loadData();
// Restore last view
const lv=sessionStorage.getItem('ct-view');
if(lv&&lv!=='Dash'){
const lid=sessionStorage.getItem('ct-lotid');
if(lid){
setTimeout(()=>{
const lot=lots.find(l=>l.id===lid);
if(lot){cLot=lv==='Aud'?JSON.parse(JSON.stringify(lot)):lot;
if(lv==='Form'){cLot=JSON.parse(JSON.stringify(lot));cStep=+(sessionStorage.getItem('ct-step')||0);renderForm()}
else if(lv==='Det')renderDet();
else if(lv==='Aud')renderAud();}},100)}}
}

// ═══ SECRET PANEL (double-click logo) ═══
function toggleSecretPanel(){
if(cUser?.role!=='admin')return; // Only admin can open
const p=document.getElementById('secretPanel'),o=document.getElementById('spOverlay');
if(p.classList.contains('open')){closeSecretPanel()}else{p.classList.add('open');o.classList.add('open');renderSecretPanel()}}
function closeSecretPanel(){document.getElementById('secretPanel').classList.remove('open');document.getElementById('spOverlay').classList.remove('open')}

function renderSecretPanel(){
const bd=document.getElementById('spBody');const a=gA();const cls=gC();

let h=`<div class="sp-section"><h4>👤 Mi Cuenta</h4>

<div class="sp-item dng" onclick="doLogout()">🚪 Cerrar sesión</div>
<div style="font-size:11px;color:var(--tx3);margin-top:6px">Último acceso: ${a.la||'—'}</div></div>

<div class="sp-section"><h4>👥 Clientes (${cls.length})</h4>
<div class="sp-item" onclick="spAddClient()" style="color:var(--gr);font-weight:600">+ Agregar nuevo cliente</div>`;
if(cls.length){cls.forEach(c=>{const nlots=(getAllLots().filter(l=>l.clientId===c.id)||[]).length;

h+=`</div><div id="spFormArea"></div>`;
bd.innerHTML=h}

const area=document.getElementById('spFormArea');
area.innerHTML=`<div class="sp-section"><h4>🔑 Cambiar Contraseña</h4>

function spDoChangePwd(){
const m=document.getElementById('spPwMsg'),a=gA(),o=document.getElementById('spPwO').value,n=document.getElementById('spPwN').value,c=document.getElementById('spPwC').value;
if(o!==a.pass){m.style.display='block';m.style.background='var(--rdbg)';m.style.color='var(--rd)';m.textContent='❌ Incorrecta';return}
if(n.length<6){m.style.display='block';m.style.background='var(--wnbg)';m.style.color='var(--wn)';m.textContent='⚠️ Mín 6 chars';return}
if(n!==c){m.style.display='block';m.style.background='var(--rdbg)';m.style.color='var(--rd)';m.textContent='❌ No coinciden';return}
a.pass=n;sA(a);m.style.display='block';m.style.background='var(--okbg)';m.style.color='var(--ok)';m.textContent='✅ Cambiada';setTimeout(renderSecretPanel,1200)}

function spSaveClient(){
const m=document.getElementById('ncMsg'),e=document.getElementById('ncE').value.trim(),u=document.getElementById('ncU').value.trim().toLowerCase(),p=document.getElementById('ncP').value,c=document.getElementById('ncC').value.trim(),r=document.getElementById('ncR').value.trim();
if(!e||!u||!p){m.style.display='block';m.style.background='var(--wnbg)';m.style.color='var(--wn)';m.textContent='⚠️ Empresa, usuario y contraseña requeridos';return}
if(p.length<6){m.style.display='block';m.style.background='var(--wnbg)';m.style.color='var(--wn)';m.textContent='⚠️ Clave mín 6 chars';return}
const cls=gC();if(u==='admin'||cls.some(x=>x.user.toLowerCase()===u)){m.style.display='block';m.style.background='var(--rdbg)';m.style.color='var(--rd)';m.textContent='❌ Usuario ya existe';return}
cls.push({id:'CL-'+Date.now().toString(36).toUpperCase(),empresa:e,user:u,pass:p,contacto:c,region:r,la:null});sC(cls);
m.style.display='block';m.style.background='var(--okbg)';m.style.color='var(--ok)';m.textContent='✅ '+e+' creado';setTimeout(renderSecretPanel,1000)}

function spResetPwd(id){const p=prompt('Nueva clave (mín 6):');if(!p||p.length<6){alert('Mín 6 caracteres');return}const cls=gC(),c=cls.find(x=>x.id===id);if(c){c.pass=p;sC(cls);renderSecretPanel()}}

function saveData(){const all=getAllLots().filter(l=>l.clientId!==getMyClientId());saveAllLots([...all,...lots])}

const FM={
rendCP:(c,p)=>c&&p&&+c>0?((+p/+c)*100).toFixed(2):null,
rendPV:(p,v)=>p&&v&&+p>0?((+v/+p)*100).toFixed(2):null,
rendT:(c,v)=>c&&v&&+c>0?((+v/+c)*100).toFixed(2):null,
clasSCA:p=>{if(!p)return{c:"—",co:"#999"};p=+p;if(p>=90)return{c:"Outstanding",co:"#1B5E20"};if(p>=85)return{c:"Excellent",co:"#2E7D32"};if(p>=80)return{c:"Very Good",co:"#558B2F"};if(p>=75)return{c:"Good",co:"#9E9D24"};return{c:"Below Spec.",co:"#BF360C"}},
clasAlt:a=>{if(!a)return{c:"—",s:""};a=+a;if(a>=1500)return{c:"SHB",s:"Strictly Hard Bean",co:"#1B5E20"};if(a>=1200)return{c:"HB",s:"Hard Bean",co:"#2E7D32"};return{c:"STD",s:"Standard",co:"#9E9D24"}},
valHum:h=>{if(!h)return{m:"—",co:"#999",ok:null};h=+h;if(h>=10&&h<=12.5)return{m:h+"% OK",co:"#2E7D32",ok:1};return{m:h+"% Fuera rango",co:"#C62828",ok:0}},
comp:l=>{const f=[l.productor,l.finca,l.region,l.provincia,l.distrito,l.altitud,l.variedad,l.fechaCosecha,l.pesoKgCereza,l.proceso,l.humedadFinal,l.pesoKgPergamino,l.puntajeTaza,l.transportista,l.fechaDespacho,l.destino,l.guiaRemision];return Math.round(f.filter(x=>x&&x!=="").length/f.length*100)},
riesgo:l=>{let r=0;if(+l.humedadFinal&&(+l.humedadFinal<9||+l.humedadFinal>13))r+=20;const rn=+FM.rendCP(l.pesoKgCereza,l.pesoKgPergamino);if(rn&&(rn<16||rn>25))r+=20;if(FM.comp(l)<50)r+=25;else if(FM.comp(l)<75)r+=10;if(+l.puntajeTaza&&+l.puntajeTaza<70)r+=15;return Math.min(r,100)},
riesgoL:s=>{if(s<=15)return{l:"Bajo",co:"#2E7D32",bg:"#E8F5E9"};if(s<=35)return{l:"Moderado",co:"#F57F17",bg:"#FFF8E1"};if(s<=60)return{l:"Alto",co:"#E65100",bg:"#FFF3E0"};return{l:"Crítico",co:"#C62828",bg:"#FFEBEE"}},
certSt:(l,cn)=>{const d=CC[cn];if(!d)return{};let tT=0,tD=0,tC=0,tCD=0,cT=0,cD=0,cC=0,cCD=0;d.traz.forEach(s=>s.items.forEach(i=>{tT++;if(l.checks?.[i.id])tD++;if(i.cr){tC++;if(l.checks?.[i.id])tCD++}}));d.comp.forEach(s=>s.items.forEach(i=>{cT++;if(l.checks?.[i.id])cD++;if(i.cr){cC++;if(l.checks?.[i.id])cCD++}}));return{tT,tD,tC,tCD,cT,cD,cC,cCD,tP:tT?Math.round(tD/tT*100):0,cP:cT?Math.round(cD/cT*100):0}},
certTrazPct:(l,cn)=>FM.certSt(l,cn).tP||0
};

if(l.certificaciones?.length){h+=`<div class="ds"><h3>🛡 Certificaciones</h3>`;l.certificaciones.forEach(cn=>{const d=CC[cn];if(!d)return;const st=FM.certSt(l,cn);h+=`<div style="display:flex;justify-content:space-between;padding:8px 12px;border-radius:6px;border:1px solid ${d.co}18;background:${d.co}04;margin-bottom:6px;cursor:pointer" onclick="openModal('${cn}')"><div style="font-weight:700;color:${d.co}">${cn}</div><div style="text-align:right;font-size:11px"><span style="color:var(--bl);font-weight:700">T:${st.tD}/${st.tT}</span> · <span style="color:var(--am)">C:${st.cD}/${st.cT}</span></div></div>`});h+=`</div>`}
[{t:"🌱 Origen",its:[["Productor",l.entregas&&l.entregas.length>1?l.entregas.length+" productores":l.productor],["Finca",l.finca],["Región",l.region],["Provincia",l.provincia],["Distrito",l.distrito],["Altitud",l.altitud?l.altitud+"m "+al.c:""],["Variedad",l.variedad]]},{t:"🏭 Beneficio",its:[["Cosecha",l.fechaCosecha],["Proceso",l.proceso],["Cereza Neto",l.pesoKgCereza?l.pesoKgCereza+"kg"+(l.nroSacosCereza?" ("+l.nroSacosCereza+" sacos, tara "+(+l.nroSacosCereza*0.2).toFixed(1)+"kg)":""):""],["Humedad",hu.m],["Pergamino Neto",l.pesoKgPergamino?l.pesoKgPergamino+"kg"+(l.nroSacosPergamino?" ("+l.nroSacosPergamino+" sacos)":""):""],["Rend",re?re+"%":""]]},{t:"☕ Calidad",its:[["SCA",l.puntajeTaza?l.puntajeTaza+" "+sc.c:""],["Defectos",l.defectos],["Cata",l.notasCata]]},{t:"🚛 Transporte",its:[["Guía Remisión",l.guiaRemision],["Transportista",l.transportista],["Placa",l.placaVehiculo],["Tipo Vehículo",l.tipoVehiculo],["Despacho",l.fechaDespacho],["Destino",l.destino],["P.Bruto Veh.",l.pesoBrutoVehiculo?l.pesoBrutoVehiculo+"kg":""],["Tara Veh.",l.taraVehiculo?l.taraVehiculo+"kg":""],["P.Neto Carga",l.pesoBrutoVehiculo&&l.taraVehiculo?(+l.pesoBrutoVehiculo-(+l.taraVehiculo)).toFixed(1)+"kg":""]]}].forEach(sec=>{h+=`<div class="ds"><h3>${sec.t}</h3><div class="dg">${sec.its.map(([la,va])=>`<div class="di"><div class="dl">${la}</div><div class="dv">${va||'—'}</div></div>`).join('')}</div></div>`});
h+=`</div>`;document.getElementById('vDet').innerHTML=h;sV('Det')}

// ═══ AUDIT ═══
function renderAud(){const l=cLot,ri=FM.riesgoL(FM.riesgo(l)),co=FM.comp(l);
const fi=[];if(co<60)fi.push({t:'cr',m:`Datos incompletos (${co}%)`});if(FM.valHum(l.humedadFinal).ok===0)fi.push({t:'cr',m:'Humedad fuera rango'});const re=FM.rendCP(l.pesoKgCereza,l.pesoKgPergamino);if(re&&(+re<16||+re>25))fi.push({t:'cr',m:`Rendimiento: ${re}%`});
if(l.certificaciones)l.certificaciones.forEach(cn=>{const st=FM.certSt(l,cn);if(st.tC>st.tCD)fi.push({t:'cr',m:`${cn}: ${st.tC-st.tCD} CRÍT traz.`});if(st.cC>st.cCD)fi.push({t:'ob',m:`${cn}: ${st.cC-st.cCD} crít cumpl.`})});
if(!fi.length)fi.push({t:'ok',m:'Todo verificado.'});
let h=`<div class="afu"><div class="fc"><div class="ft">🛡 Auditoría</div><div class="fdsc"><b>${l.id}</b> — ${l.productor||'—'}</div>
<div class="fbx" style="background:${ri.bg}80;border:1px solid ${ri.co}20"><div style="font-size:13px;font-weight:700;color:${ri.co};margin-bottom:8px">⚡ Riesgo: ${FM.riesgo(l)}/100 (${ri.l})</div>${fi.map(f=>`<div class="fnd"><span class="ft2" style="background:${f.t==='cr'?'var(--rdbg)':f.t==='ok'?'var(--okbg)':'var(--wnbg)'};color:${f.t==='cr'?'var(--rd)':f.t==='ok'?'var(--ok)':'var(--wn)'}">${f.t==='cr'?'CRÍT':f.t==='ok'?'OK':'OBS'}</span><span>${f.m}</span></div>`).join('')}</div>`;
if(l.certificaciones?.length){l.certificaciones.forEach(cn=>{const d=CC[cn];if(!d)return;const st=FM.certSt(l,cn);
h+=`<div class="cacc" id="ac_${d.id}"><div class="cacc-h" style="background:${d.co}05" onclick="document.getElementById('ac_${d.id}').classList.toggle('open')"><div style="font-weight:700;color:${d.co}">${cn}</div><div style="text-align:right;font-size:10px"><span style="color:var(--bl);font-weight:700">T:${st.tD}/${st.tT}(${st.tP}%)</span> <span style="color:var(--am)">C:${st.cD}/${st.cT}(${st.cP}%)</span></div></div><div class="cacc-b">
<div class="sh-t"><div class="stl">🔗 TRAZABILIDAD</div></div>`;
d.traz.forEach(sec=>{h+=`<div class="clcat">${sec.cat}</div>`;sec.items.forEach(it=>{const ck=l.checks?.[it.id];h+=`<div class="ci${ck?' on':''}" onclick="togChk('${it.id}')"><div class="cbox${ck?' on':''}" style="${ck?`background:${d.co};border-color:${d.co}`:''}">${ck?'✓':''}</div><div><div class="ctx">${it.t}</div><div class="cmeta"><span class="tp ${it.cr?'tp-c':'tp-m'}">${it.cr?'CRÍT':'MEJ'}</span><span class="rf" style="color:${d.co}">${it.ref}</span></div></div></div>`})});
h+=`<div class="sh-c"><div class="stl">🔒 CUMPLIMIENTO</div></div>`;
d.comp.forEach(sec=>{h+=`<div class="clcat">${sec.cat}</div>`;sec.items.forEach(it=>{const ck=l.checks?.[it.id];h+=`<div class="ci${ck?' on':''}" onclick="togChk('${it.id}')"><div class="cbox${ck?' on':''}" style="${ck?`background:${d.co};border-color:${d.co}`:''}">${ck?'✓':''}</div><div><div class="ctx">${it.t}</div><div class="cmeta"><span class="tp ${it.cr?'tp-c':'tp-m'}">${it.cr?'CRÍT':'MEJ'}</span><span class="rf" style="color:${d.co}">${it.ref}</span></div></div></div>`})});
h+=`</div></div>`})}
h+=`<div class="fg" style="margin-top:16px"><div class="fld"><label>Auditor</label><input value="${l.auditor||''}" oninput="cLot.auditor=this.value"></div><div class="fld"><label>Fecha</label><input type="date" value="${l.fechaAuditoria||''}" oninput="cLot.fechaAuditoria=this.value"></div></div>
<div style="margin-top:14px"><label style="font-size:10px;font-weight:700;color:var(--gr);text-transform:uppercase">Resultado</label><div class="aopts">${[{v:'aprobado',l:'✅ Aprobado',c:'#2E7D32'},{v:'observado',l:'⚠️ Observado',c:'#E65100'},{v:'rechazado',l:'❌ Rechazado',c:'#C62828'}].map(o=>`<div class="aopt" style="${l.estadoAuditoria===o.v?`border-color:${o.c};background:${o.c}10;color:${o.c}`:''}" onclick="cLot.estadoAuditoria='${o.v}';renderAud()">${o.l}</div>`).join('')}</div></div>
<div class="fld fld-f" style="margin-top:12px"><label>Observaciones</label><textarea oninput="cLot.observacionesAuditoria=this.value">${l.observacionesAuditoria||''}</textarea></div>
<div class="fa"><div class="sp"></div><button class="btn btn-p" onclick="saveLot()">🛡 Guardar</button></div></div></div>`;
document.getElementById('vAud').innerHTML=h;sV('Aud')}

// ═══ MODAL ═══
function openModal(w){const ov=document.getElementById('modOv'),ti=document.getElementById('modTi'),bd=document.getElementById('modBd');ov.classList.remove('hidden');
if(w==='library'){ti.textContent='📖 Normas';let h='';Object.entries(CC).forEach(([k,c])=>{const tC=c.traz.reduce((a,s)=>a+s.items.length,0),cC=c.comp.reduce((a,s)=>a+s.items.length,0);h+=`<div class="clc" style="border-left:3px solid ${c.co}" onclick="openModal('${k}')"><div style="font-weight:700;color:${c.co}">${k}</div><div style="font-size:11px;color:var(--tx2);margin-top:2px">${c.nm}</div><div style="font-size:10px;margin-top:4px"><span style="color:var(--bl);font-weight:700">🔗 ${tC} traz.</span> <span style="color:var(--am);font-weight:700">🔒 ${cC} cumpl.</span></div></div>`});bd.innerHTML=h}
else{const d=CC[w];if(!d)return;ti.textContent='📖 '+w;let h=`<button class="btn btn-s btn-sm" onclick="openModal('library')" style="margin-bottom:12px">← Todas</button><div style="background:${d.co}06;border:1px solid ${d.co}15;border-radius:var(--rs);padding:14px;margin-bottom:14px;font-size:12px"><div style="font-weight:700;color:${d.co}">${d.nm}</div><div style="margin-top:3px">${d.ds}</div><div style="color:var(--tx2);margin-top:4px"><b>Vigencia:</b> ${d.vi} · <b>Org:</b> ${d.og}</div></div>
<div class="sh-t"><div class="stl">🔗 TRAZABILIDAD</div><div class="ssb">Cadena custodia · Balance masa · Segregación</div></div>`;
d.traz.forEach(sec=>{h+=`<div class="clcat">${sec.cat}</div>`;sec.items.forEach(it=>{h+=`<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f5f0eb;font-size:12px"><span class="tp ${it.cr?'tp-c':'tp-m'}" style="min-width:40px;text-align:center">${it.cr?'CRÍT':'MEJ'}</span><div style="flex:1"><div>${it.t}</div><div style="font-size:10px;color:${d.co};font-weight:600;margin-top:1px">${it.ref}</div></div></div>`})});
h+=`<div class="sh-c" style="margin-top:8px"><div class="stl">🔒 CUMPLIMIENTO</div><div class="ssb">Social · Ambiental · Gestión</div></div>`;
d.comp.forEach(sec=>{h+=`<div class="clcat">${sec.cat}</div>`;sec.items.forEach(it=>{h+=`<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f5f0eb;font-size:12px"><span class="tp ${it.cr?'tp-c':'tp-m'}" style="min-width:40px;text-align:center">${it.cr?'CRÍT':'MEJ'}</span><div style="flex:1"><div>${it.t}</div><div style="font-size:10px;color:${d.co};font-weight:600;margin-top:1px">${it.ref}</div></div></div>`})});
bd.innerHTML=h}}
function closeModal(){document.getElementById('modOv').classList.add('hidden')}
</script>
</body></html>
